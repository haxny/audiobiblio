services:
  audiobiblio:
    build: .
    container_name: audiobiblio
    restart: unless-stopped
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - media:/media
      - data:/app/data
      # Existing curated libraries, mounted READ-ONLY for import scanning (link-only;
      # Accept+Move deliberately fails on ro mounts). Override via FICTION_PATH in .env.
      - ${FICTION_PATH:-/volume3/eBOOKs/eBOOKs.fiction}:/media/fiction
      # Nonfiction curated library (SFT manual collection etc.) — read-only,
      # for import scanning and pairing against indexed episodes.
      - ${NONFICTION_PATH:-/volume3/eBOOKs/eBOOKs.nonfiction}:/media/nonfiction
      # - inbox:/media/_inbox   # uncomment when AUDIOBIBLIO_INBOX_DIRS=/media/_inbox is set
    environment:
      - AUDIOBIBLIO_LIBRARY_DIR=/media/audiobooks
      - AUDIOBIBLIO_DOWNLOAD_DIR=/media/_downloading
      # - AUDIOBIBLIO_INBOX_DIRS=/media/_inbox
      - ABS_URL=${ABS_URL:-}
      - ABS_API_KEY=${ABS_API_KEY:-}
      - JD_HOST=jdownloader
      - JD_PORT=3129
      # XDG dirs: redirect platformdirs paths into the persisted data volume.
      # Without these, platformdirs resolves to /root/.local/share/audiobiblio
      # (outside the volume) and the DB is lost on container recreation.
      - XDG_DATA_HOME=/app/data   # DB lives at /app/data/audiobiblio/db.sqlite3
      - XDG_STATE_HOME=/app/data  # logs live at /app/data/audiobiblio/log/
    ports:
      - "${AUDIOBIBLIO_HOST_PORT:-8080}:8080"
    depends_on:
      - jdownloader

  jdownloader:
    image: jlesage/jdownloader-2
    container_name: jdownloader
    restart: unless-stopped
    volumes:
      - jd_config:/config
      - media:/output
    ports:
      - "5800:5800"   # Web UI (optional, for initial setup)
    environment:
      - KEEP_APP_RUNNING=1
      - CLEAN_TMP_DIR=1

  scraper:
    build: .
    container_name: audiobiblio-scraper
    profiles: ["scraper"]
    volumes:
      - data:/app/data
    environment:
      - SKTORRENT_USER=${SKTORRENT_USER:-}
      - SKTORRENT_PASS=${SKTORRENT_PASS:-}
      - XDG_DATA_HOME=/app/data   # DB at /app/data/audiobiblio/db.sqlite3
    entrypoint: ["sh", "-c", "python -c 'from audiobiblio.core.db.session import init_db; init_db()' && python scripts/sktorrent_scraper.py \"$@\"", "--"]
    command: ["--scrape", "--all-categories"]

volumes:
  media:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MEDIA_PATH:-/volume3/eBOOKs/audiobooks}
  data:
  jd_config:
  # inbox:                          # uncomment together with the service lines above; see docs/deploy-nas.md §6
  #   driver: local
  #   driver_opts:
