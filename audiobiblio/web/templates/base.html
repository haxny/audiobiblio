<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}audiobiblio{% endblock %}</title>
    <link rel="stylesheet" href="/static/audiobiblio.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-sse@2.2.2/sse.js"></script>
    <script src="/static/audiobiblio.js"></script>
</head>
<body>
    <header>
        <div class="inner">
            <div>
                <h1><a href="/">audiobiblio</a></h1>
                <div class="subtitle">audioknihy pod kontrolou</div>
            </div>
            <nav>
                <a href="/" {% if active == 'home' %}class="active"{% endif %}>Console</a>
                <a href="/inbox" {% if active == 'inbox' %}class="active"{% endif %}>Inbox
                    <span hx-get="/_partials/inbox_badge" hx-trigger="load, every 30s" hx-swap="innerHTML"></span></a>
                <a href="/targets" {% if active == 'targets' %}class="active"{% endif %}>Zdroje</a>
                <a href="/dedupe" {% if active == 'dedupe' %}class="active"{% endif %}>Dedupe</a>
                <a href="/import" {% if active == 'import' %}class="active"{% endif %}>Import</a>
                <a href="/jobs" {% if active == 'jobs' %}class="active"{% endif %}>Downloads</a>
                <a href="/library" {% if active == 'library' or active == 'episodes' %}class="active"{% endif %}>Library</a>
                <a href="/gaps" {% if active == 'gaps' %}class="active"{% endif %}>Gaps</a>
                <a href="/segmentation" {% if active == 'segmentation' %}class="active"{% endif %}>Segmentace</a>
                <a href="/programs" {% if active == 'programs' %}class="active"{% endif %}>Programs</a>
                <a href="/catalog" {% if active == 'catalog' %}class="active"{% endif %}>Catalog</a>
                <a href="/logs" {% if active == 'logs' %}class="active"{% endif %}>Logs</a>
                <a href="/system" {% if active == 'system' %}class="active"{% endif %}>System</a>
            </nav>
            <form action="/search" method="get" class="nav-search" role="search">
                <input type="search" name="q" value="{{ q or '' }}" placeholder="Hledat…" aria-label="Hledat">
            </form>
        </div>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <span hx-get="/_partials/stats" hx-trigger="load, every 30s" hx-swap="innerHTML" id="footer-stats"></span>
    </footer>
</body>
</html>
